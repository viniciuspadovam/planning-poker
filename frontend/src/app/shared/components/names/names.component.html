<div class="grid grid-cols-9 gap-y-5 justify-items-center">
    @for(user of users; track user.id) {
        <div class="flex flex-col items-center gap-4 w-min">
            <app-card [value]="user.card"></app-card>
            <span class="text-center">{{user.username}}</span>
        </div>
    }
</div>
